<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Gangs Search</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --border: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.5rem;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .header p {
      font-size: 0.9rem;
      color: #64748b;
      margin: 0;
    }

    /* Search bar layout */
    .search-container {
      display: flex;
      gap: 8px;
    }

    .search-box {
      flex: 1;
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .search-btn {
      padding: 0 20px;
      background-color: var(--primary);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .search-btn:hover {
      background-color: var(--primary-hover);
    }

    .results {
      margin-top: 20px;
    }

    /* Featured Main Word Card at Top */
    .main-word-card {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .main-word-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 800;
      color: #166534;
      background-color: #bbf7d0;
      padding: 2px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .main-word-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #0f172a;
    }

    .main-word-def {
      font-size: 0.95rem;
      color: #1e293b;
      margin-top: 4px;
      line-height: 1.5;
    }

    /* Group Card */
    .group-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .group-header {
      background-color: #eff6ff;
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
    }

    .group-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e40af;
      margin: 0;
    }

    .word-list {
      padding: 12px 18px;
    }

    .word-item {
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .word-item:last-child {
      border-bottom: none;
    }

    .word-name {
      font-weight: 700;
      color: #0f172a;
      font-size: 1.05rem;
      display: inline-block;
    }

    .word-def {
      color: #334155;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 4px;
    }

    /* Highlight style */
    mark.highlight {
      background-color: #fef08a;
      color: #854d0e;
      font-weight: 700;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .no-results {
      text-align: center;
      color: #64748b;
      margin-top: 30px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>📚 Vocab Gangs Search</h1>
      <p>Master English Vocabulary in One App</p>
    </div>

    <div class="search-container">
      <input type="text" id="search" class="search-box" placeholder="Type a word to search..." onkeydown="handleKeyPress(event)">
      <button class="search-btn" onclick="searchWord()">Search</button>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script>
    let csvData = [];

    // Parse gangs.csv on load
    Papa.parse('gangs.csv', {
      download: true,
      header: true,
      complete: function(results) {
        csvData = results.data;
      }
    });

    // Parse raw text into structured array of objects
    function parseWordList(rawText) {
      if (!rawText) return [];
      const regex = /([A-Za-z0-9\-\s\/\'\"]+):\s*([^:]+)(?=\s+[A-Za-z0-9\-\s\/\'\"]+:|$)/g;
      let matches = [];
      let match;
      while ((match = regex.exec(rawText)) !== null) {
        matches.push({
          word: match[1].trim(),
          definition: match[2].trim()
        });
      }
      return matches;
    }

    function highlightText(text, query) {
      if (!query) return text;
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escapedQuery})`, 'gi');
      return text.replace(regex, '<mark class="highlight">$1</mark>');
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        searchWord();
      }
    }

    function searchWord() {
      const query = document.getElementById('search').value.trim();
      const resultsContainer = document.getElementById('results');
      resultsContainer.innerHTML = '';

      if (!query || csvData.length === 0) return;

      const lowerQuery = query.toLowerCase();

      // Find groups that contain the search query anywhere
      const matchingGroups = csvData.filter(row => {
        return (
          (row['Words with Meanings'] && row['Words with Meanings'].toLowerCase().includes(lowerQuery)) ||
          (row['Group Meaning & Context'] && row['Group Meaning & Context'].toLowerCase().includes(lowerQuery))
        );
      });

      if (matchingGroups.length === 0) {
        resultsContainer.innerHTML = '<div class="no-results">No matching words or groups found.</div>';
        return;
      }

      // 1. EXTRACT EXACT MATCHING MAIN WORDS ACROSS ALL GROUPS (Deduplicated)
      let exactMainMatches = [];
      let seenWords = new Set();

      csvData.forEach(group => {
        const rawWords = group['Words with Meanings'] || '';
        const wordEntries = parseWordList(rawWords);
        
        wordEntries.forEach(entry => {
          const cleanWord = entry.word.trim().toLowerCase();
          
          // Strict exact word comparison so 'lavish' != 'slavish'
          if (cleanWord === lowerQuery) {
            const uniqueKey = `${cleanWord}:::${entry.definition.trim().toLowerCase()}`;
            if (!seenWords.has(uniqueKey)) {
              seenWords.add(uniqueKey);
              exactMainMatches.push(entry);
            }
          }
        });
      });

      let finalHtml = '';

      // 2. RENDER ALL MAIN WORD CARDS AT THE VERY TOP FIRST
      if (exactMainMatches.length > 0) {
        exactMainMatches.forEach(mainWord => {
          const hWord = highlightText(mainWord.word, query);
          const hDef = highlightText(mainWord.definition, query);
          finalHtml += `
            <div class="main-word-card">
              <div class="main-word-badge">MAIN WORD</div>
              <div class="main-word-title">${hWord} :</div>
              <div class="main-word-def">${hDef}</div>
            </div>
          `;
        });
      }

      // 3. RENDER ALL MATCHING GROUPS BELOW
      matchingGroups.forEach(group => {
        const groupNo = group['Group No'] || '';
        const groupMeaning = group['Group Meaning & Context'] || '';
        const rawWords = group['Words with Meanings'] || '';

        const wordEntries = parseWordList(rawWords);
        const highlightedGroupMeaning = highlightText(groupMeaning, query);

        finalHtml += `
          <div class="group-card">
            <div class="group-header">
              <div class="group-title">Group ${groupNo} : ${highlightedGroupMeaning}</div>
            </div>
            <div class="word-list">
        `;

        wordEntries.forEach(entry => {
          const highlightedWord = highlightText(entry.word, query);
          const highlightedDef = highlightText(entry.definition, query);

          finalHtml += `
            <div class="word-item">
              <div class="word-name">${highlightedWord}:</div>
              <div class="word-def">${highlightedDef}</div>
            </div>
          `;
        });

        finalHtml += `
            </div>
          </div>
        `;
      });

      resultsContainer.innerHTML = finalHtml;
    }
  </script>
</body>
</html>
